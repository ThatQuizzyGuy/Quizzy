<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Quizzy Multiplayer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <img src="{{ url_for('static', filename='Images/logo.png') }}" id="logo">

    <div id="entryFrame">
        <input id="nameInput" placeholder="Your name">
        <input id="roomInput" placeholder="Room code" maxlength="4">
        <button id="createBtn">Create Room</button>
        <button id="joinBtn">Join Room</button>
    </div>

    <div id="notificationArea"></div>

    <div id="hostControls" style="display: none;">
        <h2>Host Panel</h2>
        <div>Room Code: <span id="hostRoomCode"></span></div>
        <button id="startBtn">Start Quiz</button>
        <button id="nextBtn">Next Question</button>
    </div>

    <div id="quizArea" style="display:none;">
        <div id="questionText"></div>
        <div id="answers"></div>
        <div id="feedback"></div>
        <div id="leaderboard" style="display:none;">
            <h3>Leaderboard</h3>
            <ul id="leaderboardList"></ul>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js" crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='client.js') }}"></script>
</body>
</html>
